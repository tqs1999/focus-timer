<!DOCTYPE html>

<html>
<head>
<title>Focus Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111 0%, #000 80%);
  color: #e8e4d9;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  position: absolute;
  top: 25px;
  right: 40px;
  font-size: 15px;
  opacity: 0.6;
  letter-spacing: 1px;
}

/* TIMER */
#timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  display: flex;
  align-items: center;
  gap: 25px;
  font-size: 18vw;
  font-weight: 700;
  letter-spacing: 4px;
  text-shadow:
    0 0 25px rgba(255,255,255,0.08),
    0 0 60px rgba(255,255,255,0.04);
}

/* FULLSCREEN */
.fullscreen #timer {
  font-size: 22vw;
  letter-spacing: 8px;
}

/* STRUCTURE */
.time-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.label {
  font-size: 18px;
  opacity: 0.5;
  letter-spacing: 2px;
  margin-top: 10px;
}

.colon {
  display: flex;
  align-items: center;
  margin-bottom: 30px;
}

/* CONTROLS */
.controls {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(145deg, #ffd000, #ffb800);
  color: black;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255,208,0,0.2);
}

/* SIDE */
.side-btn {
  position: absolute;
  right: 35px;
  background: linear-gradient(145deg, #ffd000, #ffb800);
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 26px;
  border: none;
  box-shadow: 0 4px 15px rgba(255,208,0,0.25);
}

#plus { top: 45%; }
#minus { top: 55%; }

/* INPUT */
input {
  padding: 12px;
  border-radius: 15px;
  border: none;
  width: 130px;
  text-align: center;
  font-size: 18px;
  background: #1a1a1a;
  color: white;
}

/* CUSTOM */
.custom {
  position: absolute;
  top: 75%;
  left: 50%;
  transform: translateX(-50%);
}

/* ✅ FULLSCREEN CLEAN (UPDATED) */
.fullscreen .controls,
.fullscreen .custom,
.fullscreen .side-btn {
  display: none;
}
</style>

</head>

<body>

<div class="topbar">
  <div onclick="toggleFullscreen()" style="cursor:pointer;">Fullscreen</div>
</div>

<div id="timer">

  <div class="time-box">
    <div id="h">0</div>
    <div class="label">Hours</div>
  </div>

  <div class="colon">:</div>

  <div class="time-box">
    <div id="m">25</div>
    <div class="label">Minutes</div>
  </div>

  <div class="colon">:</div>

  <div class="time-box">
    <div id="s">00</div>
    <div class="label">Seconds</div>
  </div>

</div>

<button id="plus" class="side-btn" onclick="addTime()">+</button> <button id="minus" class="side-btn" onclick="reduceTime()">−</button>

<div class="controls">
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>
  <button onclick="reset()">Reset</button>
</div>

<div class="custom">
  <input id="customTime" type="number" placeholder="Min">
  <button onclick="setCustomTime()">Set</button>
</div>

<audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio> <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/medium_bell_ringing_near.ogg"></audio>

<script>
let duration = 1500;
let startTime = null;
let remaining = duration;
let interval = null;

function updateDisplay(sec) {
  let h = Math.floor(sec / 3600);
  let m = Math.floor((sec % 3600) / 60);
  let s = sec % 60;

  document.getElementById("h").innerText = h;
  document.getElementById("m").innerText = m;
  document.getElementById("s").innerText = s < 10 ? "0" + s : s;
}

function start() {
  if (interval) return;

  startTime = Date.now() - (duration - remaining) * 1000;

  interval = setInterval(() => {
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    remaining = duration - elapsed;

    if (remaining <= 10 && remaining > 0) {
      let tick = document.getElementById("tick");
      tick.currentTime = 0;
      tick.play();
    }

    if (remaining <= 0) {
      remaining = 0;
      updateDisplay(remaining);

      let alarm = document.getElementById("alarm");
      alarm.play();

      pause();
    } else {
      updateDisplay(remaining);
    }
  }, 1000);
}

function pause() {
  clearInterval(interval);
  interval = null;
}

function reset() {
  pause();
  remaining = duration;
  updateDisplay(remaining);
}

function addTime() {
  duration += 60;
  remaining += 60;
  updateDisplay(remaining);
}

function reduceTime() {
  if (duration > 60) {
    duration -= 60;
    remaining -= 60;
    updateDisplay(remaining);
  }
}

function setCustomTime() {
  let minutes = document.getElementById("customTime").value;
  if (minutes > 0) {
    duration = minutes * 60;
    remaining = duration;
    updateDisplay(remaining);
  }
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.body.classList.add("fullscreen");
  } else {
    document.exitFullscreen();
    document.body.classList.remove("fullscreen");
  }
}

updateDisplay(remaining);
</script>

</body>
</html>
