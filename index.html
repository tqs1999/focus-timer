<!DOCTYPE html>
<html>
<head>
<title>Focus Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  color: #ffffff;
  font-family: 'Inter', sans-serif;
  height: 100vh;
}

/* TOP BAR */
.topbar {
  position: absolute;
  top: 20px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  font-size: 16px;
  opacity: 0.6;
}

/* TIMER */
#timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-weight: 700;
  letter-spacing: 4px;
  font-size: 20vw;
  text-align: center;
}

/* FULLSCREEN */
.fullscreen #timer {
  font-size: 28vw;
}

/* CONTROLS */
.controls {
  position: absolute;
  bottom: 25px;
  width: 100%;
  text-align: center;
}

/* INPUT */
#customBox {
  position: absolute;
  top: 70%;
  left: 50%;
  transform: translateX(-50%);
}

.fullscreen .controls,
.fullscreen #customBox {
  display: none;
}

button {
  padding: 10px 18px;
  margin: 5px;
  border-radius: 25px;
  border: none;
  background: #ffd000;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* SIDE */
.side-btn {
  position: absolute;
  right: 30px;
  background: #ffd000;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 26px;
  border: none;
}

#plus { top: 45%; }
#minus { top: 55%; }

input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  width: 120px;
  font-size: 18px;
  text-align: center;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Focus Mode</div>
  <div onclick="toggleFullscreen()" style="cursor:pointer;">Fullscreen</div>
</div>

<div id="timer">25 min</div>

<button id="plus" class="side-btn" onclick="addTime()">+</button>
<button id="minus" class="side-btn" onclick="reduceTime()">−</button>

<div class="controls">
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>
  <button onclick="reset()">Reset</button>
</div>

<div id="customBox">
  <input id="customTime" type="number" placeholder="Min">
  <button onclick="setCustomTime()">Set</button>
</div>

<audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/medium_bell_ringing_near.ogg"></audio>

<script>
let duration = 1500;
let startTime = null;
let remaining = duration;
let interval = null;

function formatTime(sec) {
  let h = Math.floor(sec / 3600);
  let m = Math.floor((sec % 3600) / 60);

  if (h > 0) return `${h} hr ${m} min`;
  return `${m} min`;
}

function updateDisplay(sec) {
  document.getElementById("timer").innerText = formatTime(sec);
}

function start() {
  if (interval) return;

  startTime = Date.now() - (duration - remaining) * 1000;

  interval = setInterval(() => {
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    remaining = duration - elapsed;

    if (remaining <= 10 && remaining > 0) {
      let tick = document.getElementById("tick");
      tick.currentTime = 0;
      tick.play();
    }

    if (remaining <= 0) {
      remaining = 0;
      updateDisplay(remaining);

      let alarm = document.getElementById("alarm");
      alarm.currentTime = 0;
      alarm.play();

      setTimeout(() => {
        alarm.pause();
        alarm.currentTime = 0;
      }, 5000);

      pause();
    } else {
      updateDisplay(remaining);
    }
  }, 1000);
}

function pause() {
  clearInterval(interval);
  interval = null;
}

function reset() {
  pause();
  remaining = duration;
  updateDisplay(remaining);
}

function addTime() {
  duration += 60;
  remaining += 60;
  updateDisplay(remaining);
}

function reduceTime() {
  if (duration > 60) {
    duration -= 60;
    remaining -= 60;
    updateDisplay(remaining);
  }
}

function setCustomTime() {
  let minutes = document.getElementById("customTime").value;
  if (minutes > 0) {
    duration = minutes * 60;
    remaining = duration;
    updateDisplay(remaining);
  }
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.body.classList.add("fullscreen");
  } else {
    document.exitFullscreen();
    document.body.classList.remove("fullscreen");
  }
}

updateDisplay(remaining);
</script>

</body>
</html>
